<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive</title>
    <link rel="stylesheet" href="output.css">
</head>
<body >
    <h1 class="sm:text-4xl text-center p-4 text-sm bg-purple-500 font-bold text-white " >Learn about responsive design.</h1>
    <div class="grid grid-cols-2 gap-4 m-4 sm:grid-cols-2">
  <div class="min-h-[100px] rounded-lg shadow bg-orange-500"></div>
  <div class="min-h-[100px] rounded-lg shadow bg-teal-500"></div>
</div>
<br>
*****************************************************
<br>
<div class="grid gap-4 m-4 sm:grid-cols-4">
  <div class="min-h-[100px] rounded-lg shadow bg-orange-500"></div>
  <div class="min-h-[100px] rounded-lg shadow bg-teal-500"></div>
  <div class="min-h-[100px] rounded-lg shadow bg-red-500"></div>
  <div class="min-h-[100px] rounded-lg shadow bg-purple-500"></div>
</div>
<br>
*****************************************************
<br>
<div class="grid gap-4 m-4 sm:grid-cols-12 grid-cols-1">
  <div class="min-h-[100px] sm:col-span-2 rounded-lg shadow bg-orange-500"></div>
  <div class="min-h-[100px] sm:col-span-10 rounded-lg shadow bg-teal-500"></div>
</div>
<br>
*****************************************************
<br>
<div class="grid gap-4 m-4 sm:grid-cols-12">
  <div class="min-h-[100px] sm:col-span-2 sm:block hidden rounded-lg shadow bg-orange-500"></div>
  <div class="min-h-[100px] sm:col-span-8 rounded-lg shadow bg-teal-500"></div>
  <div class="min-h-[100px] sm:col-span-2 sm:block hidden rounded-lg shadow bg-purple-500"></div>
</div>
<br>
*****************************************************
<br>
<div class="m-4 grid gap-4 sm:grid-cols-12">
  <div class="min-h-[100px] sm:col-span-2 bg-red-500 rounded-2xl"></div>
  <div class="min-h-[100px] sm:col-span-8 bg-yellow-400 rounded-2xl"></div>
  <div class="min-h-[100px] sm:col-span-2 bg-green-500 rounded-2xl"></div>
</div>
    
</body>
</html>
