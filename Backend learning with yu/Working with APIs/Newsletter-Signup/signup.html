<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newsletter-Signup</title>
    <link href="/src/output.css" rel="stylesheet" />
  </head>
  <body bgcolor="#1a1a1a">
    <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
      <div class="sm:mx-auto sm:w-full sm:max-w-sm">
        <img src="/images/newsletterlogo.jpg" alt="">
        <h2
          class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-white"
        >
          Sign up to my Newsletter!
        </h2>
      </div>

      <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
        <form action="#" method="post" class="space-y-6">
            <div class="mt-2">
                <input type="text" name="firstName" placeholder="First Name" class=" block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">
                <input type="text" name="lastName" placeholder="Last Name" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">
                <input type="email" name="email" placeholder="Email" class=" block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">
            </div>

          </div>




            <button type="submit" class="flex mt-2 sm:mx-auto sm:w-full sm:max-w-sm justify-center rounded-md bg-indigo-500 px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Sign Up</button>
          </div>

        </form>

    
      </div>
    </div>
  </body>
</html>
