<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input class="inputBox" type="text" placeholder="Enter City Name">
            <button type="submit"> 
                <img src="images/search.png"  alt="">
            </button>
        </div>
        <div class="error">
            Invalid city name...
        </div>
        <div class="weather">
            <img src="images/clear.png" class="weather-icon" alt="">
            <h1 class="temp">22°C</h1>
            <h2 class="city">Jaipur</h2>
            <div class="details">
                <div class="col col1">
                    <img class="humidity-img" src="images/humidity.png" height="50px" alt="">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png" height="50px" alt="">
                    <div style="margin-left: 20px;">
                        <p class="wind">15km/hr</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js">
        
    </script>

</body>
</html>
