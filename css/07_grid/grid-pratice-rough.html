<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Layout Practice</title>
    <style>
      .container {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: auto 400px auto;
        
      }

      .item {
        background: lightblue;
        padding: 40px;
        text-align: center;
        font-size: 24px;
        border: 1px solid black;
      }

      .item1{
        grid-column: 1/4;
      }
      .item2{
        grid-column: 1/3;
        
        
      }
      .item3{
        height: 427px;
      }
      .item4{
        grid-column: 1/3;
      }

    </style>
  </head>

  <body>
    <div class="container">
      <div style="background-color: rgb(232, 126, 144);" class="item item1">title</div>
      <div  class="item item2">content</div>
      <div style="background-color: rgb(132, 216, 132);" class="item item3">aside</div>
      <div style="background-color: rgb(234, 234, 58);" class="item item4">footer</div>
    </div>
  </body>
</html>
