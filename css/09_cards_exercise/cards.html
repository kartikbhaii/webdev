<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce</title>
    <style>
        body{
            justify-content: center;
            text-align: center;
            align-items: center;
            margin-top: 35vh;
            
        }

        .grid-container{
            display: grid;
        
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(1, 200px);
            
        }


        .box{
            border: 1px solid black;
            
        }
    </style>
</head>
<body>

    
     <div class="grid-container">
        <div class="box" style="background-color: aquamarine;">1</div>
        <div class="box" style="background-color: aquamarine;">2</div>
        <div class="box" style="background-color: aquamarine;">3</div>
        <div class="box" style="background-color: aquamarine;">4</div>
     </div>   

    
</body>
</html>
